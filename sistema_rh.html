<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema RH — Grupo WJA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f3;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e5e5e5;padding:12px 20px;display:flex;align-items:center;gap:12px}
.topbar-title{font-size:15px;font-weight:600;flex:1}
.topbar-sync{font-size:12px;padding:4px 10px;border-radius:20px;font-weight:500}
.sync-ok{background:#EAF3DE;color:#3B6D11}
.sync-err{background:#FCEBEB;color:#A32D2D}
.sync-loading{background:#E6F1FB;color:#185FA5}
.container{max-width:1100px;margin:0 auto;padding:20px}
.nav{display:flex;gap:4px;background:#fff;border:1px solid #e5e5e5;border-radius:10px;padding:6px;margin-bottom:20px;flex-wrap:wrap}
.nav-btn{padding:8px 14px;border:none;background:transparent;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;color:#666;display:flex;align-items:center;gap:6px;transition:all 0.15s}
.nav-btn:hover{background:#f5f5f3;color:#1a1a1a}
.nav-btn.active{background:#185FA5;color:#fff}
.section{display:none}.section.active{display:block}
.card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:16px 20px;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#1a1a1a}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
label{font-size:12px;color:#666;display:block;margin-bottom:4px;font-weight:500}
input,select{width:100%;font-size:13px;border:1px solid #ddd;border-radius:8px;padding:8px 10px;background:#fff;color:#1a1a1a;outline:none;transition:border 0.15s}
input:focus,select:focus{border-color:#185FA5}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:13px;font-weight:500;transition:all 0.15s}
.btn:hover{background:#f5f5f3}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5}.btn-primary:hover{background:#0C447C}
.btn-danger{background:#A32D2D;color:#fff;border-color:#A32D2D}.btn-danger:hover{background:#791F1F}
.btn-sm{padding:6px 12px;font-size:12px}
.badge{display:inline-block;font-size:11px;padding:2px 9px;border-radius:20px;font-weight:600}
.badge-green{background:#EAF3DE;color:#3B6D11}.badge-red{background:#FCEBEB;color:#A32D2D}
.badge-blue{background:#E6F1FB;color:#185FA5}.badge-amber{background:#FAEEDA;color:#854F0B}
.badge-purple{background:#EEEDFE;color:#3C3489}.badge-gray{background:#f1efe8;color:#5f5e5a}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:10px 12px;font-size:11px;font-weight:600;color:#666;border-bottom:1px solid #e5e5e5;text-transform:uppercase;letter-spacing:0.04em}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0;color:#1a1a1a}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafafa}
.stat-card{background:#f8f8f6;border-radius:10px;padding:16px;text-align:center;border:1px solid #e8e8e8}
.stat-num{font-size:28px;font-weight:700;line-height:1.2}
.stat-label{font-size:11px;color:#888;margin-top:4px;font-weight:500}
.asist-btn{padding:7px 11px;border:1px solid #ddd;border-radius:8px;font-size:11px;cursor:pointer;background:#fff;color:#888;transition:all 0.1s;font-weight:600}
.asist-btn:hover{background:#f5f5f3;color:#1a1a1a}
.asist-btn.sel-A{background:#EAF3DE;color:#3B6D11;border-color:#639922}
.asist-btn.sel-F{background:#FCEBEB;color:#A32D2D;border-color:#E24B4A}
.asist-btn.sel-D{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.asist-btn.sel-D12{background:#EEEDFE;color:#3C3489;border-color:#7F77DD}
.asist-btn.sel-V{background:#FAEEDA;color:#854F0B;border-color:#BA7517}
.asist-btn.sel-I{background:#f1efe8;color:#5f5e5a;border-color:#888}
.divider{border:none;border-top:1px solid #f0f0f0;margin:14px 0}
.empty{text-align:center;color:#aaa;font-size:13px;padding:40px;display:flex;flex-direction:column;align-items:center;gap:8px}
.worker-row{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid #e5e5e5;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all 0.1s;background:#fff}
.worker-row:hover{background:#fafafa;border-color:#ccc}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.fst{font-size:11px;font-weight:600;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr}.nav-btn span{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">&#128203; Sistema RH — Grupo WJA</div>
  <div id="sync-status" class="topbar-sync sync-loading">Conectando...</div>
  <button class="btn btn-sm" onclick="loadAll()" style="margin-left:8px">&#8635; Actualizar</button>
</div>

<div class="container">
<div class="nav">
  <button class="nav-btn active" onclick="showSection('dashboard')" id="nav-dashboard">&#9783; Dashboard</button>
  <button class="nav-btn" onclick="showSection('trabajadores')" id="nav-trabajadores">&#128100; Trabajadores</button>
  <button class="nav-btn" onclick="showSection('lista')" id="nav-lista">&#9989; Pasar lista</button>
  <button class="nav-btn" onclick="showSection('centros')" id="nav-centros">&#127970; Centros de trabajo</button>
  <button class="nav-btn" onclick="showSection('reportes')" id="nav-reportes">&#128202; Reportes</button>
</div>

<div id="sec-dashboard" class="section active">
  <div class="grid4" style="margin-bottom:16px" id="dash-stats"></div>
  <div class="grid2">
    <div class="card">
      <div class="card-title">Asistencia de hoy <span id="dash-fecha" style="font-weight:400;color:#888;font-size:12px;margin-left:auto"></span></div>
      <div id="dash-asistencia"></div>
    </div>
    <div class="card">
      <div class="card-title">Centros de trabajo</div>
      <div id="dash-centros"></div>
    </div>
  </div>
</div>

<div id="sec-trabajadores" class="section">
  <div style="display:flex;gap:8px;margin-bottom:14px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-primary btn-sm" onclick="showForm('add')">+ Alta de trabajador</button>
    <input type="text" placeholder="Buscar por nombre o RFC..." style="max-width:260px" id="search-worker" oninput="renderWorkerList()">
  </div>
  <div id="worker-list"></div>
  <div id="worker-form" style="display:none"></div>
  <div id="worker-detail" style="display:none"></div>
</div>

<div id="sec-lista" class="section">
  <div class="card" style="margin-bottom:12px">
    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
      <label style="margin:0;font-weight:600">Fecha:</label>
      <input type="date" id="lista-fecha" style="width:auto" onchange="renderLista()">
      <select id="lista-centro" style="width:auto" onchange="renderLista()"><option value="">Todos los centros</option></select>
    </div>
  </div>
  <div id="lista-container"></div>
</div>

<div id="sec-centros" class="section">
  <div style="margin-bottom:14px">
    <button class="btn btn-primary btn-sm" onclick="showCentroForm()">+ Alta de centro</button>
  </div>
  <div id="centro-form" style="display:none;margin-bottom:14px"></div>
  <div id="centros-list"></div>
</div>

<div id="sec-reportes" class="section">
  <div class="card" style="margin-bottom:14px">
    <div class="card-title">Filtros de reporte</div>
    <div class="grid3" style="margin-bottom:12px">
      <div><label>Trabajador</label><select id="rep-worker"><option value="">Todos</option></select></div>
      <div><label>Centro de trabajo</label><select id="rep-centro"><option value="">Todos</option></select></div>
      <div><label>Tipo de asistencia</label><select id="rep-tipo"><option value="">Todos</option><option value="A">Asistencia</option><option value="F">Falta</option><option value="D">Doblete</option><option value="D12">Doblete 12h</option><option value="V">Vacaciones</option><option value="I">Incapacidad</option></select></div>
    </div>
    <div class="grid2" style="margin-bottom:12px">
      <div><label>Fecha inicio</label><input type="date" id="rep-inicio"></div>
      <div><label>Fecha fin</label><input type="date" id="rep-fin"></div>
    </div>
    <button class="btn btn-primary btn-sm" onclick="generarReporte()">&#128269; Generar reporte</button>
  </div>
  <div id="reporte-result"></div>
</div>
</div>

<script>
const SCRIPT_URL='https://script.google.com/macros/s/AKfycbxTalNt0mKiSeATF8l5UO99u2VkjWuWzxdOqmxznTWGtXyLuv2OF2qq2CLc4E3AIPOB/exec';
const AL={A:'Asistencia',F:'Falta',D:'Doblete',D12:'Doblete 12h',V:'Vacaciones',I:'Incapacidad'};
const AC={A:'green',F:'red',D:'blue',D12:'purple',V:'amber',I:'gray'};
const AVC=['#B5D4F4:#0C447C','#9FE1CB:#085041','#CECBF6:#3C3489','#F5C4B3:#712B13','#FAC775:#633806'];
let S={workers:[],centros:[],asistencias:{},nextWId:1,nextCId:1};

function ss(type,msg){
  const el=document.getElementById('sync-status');
  el.className='topbar-sync sync-'+type;
  el.textContent=msg;
}

async function loadAll(){
  ss('loading','Sincronizando...');
  try{
    const r=await fetch(SCRIPT_URL+'?action=getAll');
    const d=await r.json();
    if(d.workers)S.workers=d.workers.map(w=>({...w,id:isNaN(w.id)?w.id:Number(w.id)}));
    if(d.centros)S.centros=d.centros.map(c=>({...c,id:isNaN(c.id)?c.id:Number(c.id)}));
    if(d.asistencias)S.asistencias=d.asistencias;
    if(d.config){S.nextWId=Number(d.config.nextWId)||S.nextWId;S.nextCId=Number(d.config.nextCId)||S.nextCId;}
    ss('ok','Conectado a Google Sheets');
    refreshCurrent();
  }catch(e){ss('err','Error de conexion — revisa el script');}
}

async function post(body){try{await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify(body)});}catch(e){}}
async function saveWorkers(){await post({action:'saveWorkers',workers:S.workers});await post({action:'saveConfig',config:{nextWId:S.nextWId,nextCId:S.nextCId}});}
async function saveCentros(){await post({action:'saveCentros',centros:S.centros});await post({action:'saveConfig',config:{nextWId:S.nextWId,nextCId:S.nextCId}});}
async function saveAsist(wid,fecha,rec){await post({action:'saveAsistencia',wid,fecha,rec});}

function today(){return new Date().toISOString().slice(0,10)}
function fmt(s){if(!s)return'';const p=s.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function ini(n){return(n||'').split(' ').slice(0,2).map(w=>w[0]||'').join('').toUpperCase()||'?'}
function avc(i){const p=AVC[i%AVC.length].split(':');return`background:${p[0]};color:${p[1]}`}
function cn(id){return S.centros.find(c=>String(c.id)===String(id))?.nombre||'—'}
function isAct(w){return w.activo!=='false'&&w.activo!==false}
function gv(id){return document.getElementById(id)?.value||''}

function refreshCurrent(){
  const a=document.querySelector('.section.active');if(!a)return;
  const id=a.id.replace('sec-','');
  if(id==='dashboard')renderDash();
  if(id==='trabajadores')renderWorkerList();
  if(id==='lista')renderLista();
  if(id==='centros')renderCentros();
}

function showSection(s){
  document.querySelectorAll('.section').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(e=>e.classList.remove('active'));
  document.getElementById('sec-'+s).classList.add('active');
  document.getElementById('nav-'+s).classList.add('active');
  if(s==='dashboard')renderDash();
  if(s==='trabajadores')renderWorkerList();
  if(s==='lista'){initF();populateCS('lista-centro');renderLista();}
  if(s==='centros')renderCentros();
  if(s==='reportes')initRep();
}

function initF(){const el=document.getElementById('lista-fecha');if(el&&!el.value)el.value=today()}

function renderDash(){
  const t=today();document.getElementById('dash-fecha').textContent=fmt(t);
  const ws=S.workers.filter(isAct);
  const rs=ws.map(w=>S.asistencias[w.id]?.[t]).filter(Boolean);
  const cnt=tp=>rs.filter(r=>r.tipo===tp).length;
  document.getElementById('dash-stats').innerHTML=`
    <div class="stat-card"><div class="stat-num" style="color:#185FA5">${ws.length}</div><div class="stat-label">Trabajadores activos</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#3B6D11">${cnt('A')}</div><div class="stat-label">Asistencias hoy</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#A32D2D">${cnt('F')}</div><div class="stat-label">Faltas hoy</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#854F0B">${cnt('V')+cnt('I')}</div><div class="stat-label">Vac./Incap. hoy</div></div>`;
  const ae=document.getElementById('dash-asistencia');
  if(!ws.length){ae.innerHTML='<div class="empty">No hay trabajadores registrados</div>';return}
  ae.innerHTML=ws.slice(0,10).map((w,i)=>{
    const rec=S.asistencias[w.id]?.[t];
    const badge=rec?`<span class="badge badge-${AC[rec.tipo]||'gray'}">${AL[rec.tipo]||rec.tipo}</span>`:`<span class="badge badge-gray">Sin registro</span>`;
    return`<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #f0f0f0">
      <div class="avatar" style="width:32px;height:32px;font-size:11px;${avc(i)}">${ini(w.nombre)}</div>
      <div style="flex:1;font-size:13px;font-weight:500">${w.nombre}</div>
      ${badge}${rec&&rec.centro?`<span style="font-size:11px;color:#888">${cn(rec.centro)}</span>`:''}
    </div>`}).join('');
  const ce=document.getElementById('dash-centros');
  if(!S.centros.length){ce.innerHTML='<div class="empty">No hay centros registrados</div>';return}
  ce.innerHTML=S.centros.map(c=>{
    const asg=ws.filter(w=>String(S.asistencias[w.id]?.[t]?.centro)===String(c.id));
    return`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #f0f0f0">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="font-size:14px">&#127970;</span><span style="font-size:13px;font-weight:600;flex:1">${c.nombre}</span>
        <span class="badge badge-blue">${asg.length} hoy</span>
      </div>
      ${asg.length?asg.map(w=>`<div style="font-size:12px;color:#666;padding:2px 0 2px 22px">• ${w.nombre}</div>`).join(''):'<div style="font-size:12px;color:#bbb;padding-left:22px">Sin asignaciones hoy</div>'}
    </div>`}).join('');
}

function renderWorkerList(){
  const q=gv('search-worker').toLowerCase();
  document.getElementById('worker-form').style.display='none';
  document.getElementById('worker-detail').style.display='none';
  const el=document.getElementById('worker-list');
  const ws=S.workers.filter(w=>!q||w.nombre?.toLowerCase().includes(q)||w.rfc?.toLowerCase().includes(q));
  if(!ws.length){el.innerHTML='<div class="empty"><div style="font-size:3rem">&#128100;</div>No hay trabajadores. Da de alta el primero.</div>';return}
  el.innerHTML=ws.map((w,i)=>`<div class="worker-row" onclick="showDetail('${w.id}')">
    <div class="avatar" style="${avc(i)}">${ini(w.nombre)}</div>
    <div style="flex:1"><div style="font-size:14px;font-weight:600">${w.nombre}</div><div style="font-size:12px;color:#888">${w.puesto||'Sin puesto'} &middot; ${w.telefono||'Sin tel.'}</div></div>
    <span class="badge ${isAct(w)?'badge-green':'badge-red'}">${isAct(w)?'Activo':'Baja'}</span>
    <span style="color:#ccc;font-size:18px">›</span>
  </div>`).join('');
}

function showDetail(id){
  const w=S.workers.find(x=>String(x.id)===String(id));if(!w)return;
  document.getElementById('worker-list').style.display='none';
  document.getElementById('worker-form').style.display='none';
  const el=document.getElementById('worker-detail');el.style.display='block';
  el.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
    <button class="btn btn-sm" onclick="backToList()">&#8592; Regresar</button>
    <button class="btn btn-sm" onclick="showForm('edit','${id}')">&#9998; Editar</button>
    ${isAct(w)?`<button class="btn btn-danger btn-sm" onclick="bajaW('${id}')">Dar de baja</button>`:`<button class="btn btn-sm" onclick="altaW('${id}')">Reactivar</button>`}
  </div>
  <div class="card">
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">
      <div class="avatar" style="width:56px;height:56px;font-size:20px;${avc(Number(id)%5)}">${ini(w.nombre)}</div>
      <div><div style="font-size:18px;font-weight:700">${w.nombre}</div><div style="font-size:13px;color:#888">${w.puesto||'Sin puesto'}</div></div>
    </div>
    <div class="fst">Datos personales</div>
    <div class="grid2" style="font-size:13px;gap:8px;margin-bottom:14px">
      ${fd('CURP',w.curp)}${fd('RFC',w.rfc)}${fd('NSS',w.nss)}${fd('Infonavit',w.infonavit)}
      ${fd('F. Nacimiento',fmt(w.fechaNac))}${fd('Estado civil',w.edoCivil)}
      ${fd('Sexo',w.sexo)}${fd('Tipo de sangre',w.tipoSangre)}
      ${fd('Estatura',w.estatura?w.estatura+' m':'')}${fd('Peso',w.peso?w.peso+' kg':'')}
      ${fd('Complexión',w.complexion)}
    </div>
    <div class="fst">Contacto</div>
    <div class="grid2" style="font-size:13px;gap:8px;margin-bottom:14px">
      ${fd('Teléfono',w.telefono)}${fd('Teléfono 2',w.telefono2)}
      <div style="grid-column:1/-1"><span style="color:#888">Dirección:</span> ${w.direccion||'—'}</div>
    </div>
    <div class="fst">En caso de accidente</div>
    <div class="grid2" style="font-size:13px;gap:8px">${fd('Contacto',w.emergNombre)}${fd('Tel. emergencia',w.emergTel)}</div>
  </div>`;
}
function fd(l,v){return`<div><span style="color:#888">${l}:</span> <strong>${v||'—'}</strong></div>`}
function backToList(){document.getElementById('worker-list').style.display='';document.getElementById('worker-detail').style.display='none';document.getElementById('worker-form').style.display='none';renderWorkerList();}

async function bajaW(id){
  const w=S.workers.find(x=>String(x.id)===String(id));
  if(w&&confirm('¿Dar de baja a '+w.nombre+'?')){w.activo=false;w.fechaBaja=today();ss('loading','Guardando...');await saveWorkers();ss('ok','Guardado en Google Sheets');showDetail(id);}
}
async function altaW(id){
  const w=S.workers.find(x=>String(x.id)===String(id));
  if(w){w.activo=true;delete w.fechaBaja;ss('loading','Guardando...');await saveWorkers();ss('ok','Guardado en Google Sheets');showDetail(id);}
}

function showForm(mode,id){
  document.getElementById('worker-list').style.display='none';
  document.getElementById('worker-detail').style.display='none';
  const el=document.getElementById('worker-form');el.style.display='block';
  const w=mode==='edit'?S.workers.find(x=>String(x.id)===String(id)):{};
  const ecO=['Soltero/a','Casado/a','Divorciado/a','Viudo/a','Unión libre'].map(o=>`<option ${w.edoCivil===o?'selected':''}>${o}</option>`).join('');
  const stO=['A+','A-','B+','B-','AB+','AB-','O+','O-'].map(o=>`<option ${w.tipoSangre===o?'selected':''}>${o}</option>`).join('');
  const cxO=['Delgada','Regular','Robusta','Obesa'].map(o=>`<option ${w.complexion===o?'selected':''}>${o}</option>`).join('');
  el.innerHTML=`<div style="display:flex;gap:8px;margin-bottom:14px">
    <button class="btn btn-sm" onclick="backToList()">&#8592; Regresar</button>
    <span style="font-size:15px;font-weight:700;align-self:center">${mode==='edit'?'Editar trabajador':'Alta de trabajador'}</span>
  </div>
  <div class="card">
    <div class="fst">Datos personales</div>
    <div class="grid2" style="gap:12px;margin-bottom:14px">
      <div><label>Nombre completo *</label><input id="f-nombre" value="${w.nombre||''}" placeholder="Nombre completo"></div>
      <div><label>Puesto</label><input id="f-puesto" value="${w.puesto||''}" placeholder="Puesto o cargo"></div>
      <div><label>CURP</label><input id="f-curp" value="${w.curp||''}" style="text-transform:uppercase" placeholder="CURP"></div>
      <div><label>RFC</label><input id="f-rfc" value="${w.rfc||''}" style="text-transform:uppercase" placeholder="RFC"></div>
      <div><label>Núm. Seguro Social</label><input id="f-nss" value="${w.nss||''}" placeholder="NSS"></div>
      <div><label>Infonavit</label><input id="f-infonavit" value="${w.infonavit||''}" placeholder="Núm. Infonavit"></div>
      <div><label>Fecha de nacimiento</label><input type="date" id="f-fechaNac" value="${w.fechaNac||''}"></div>
      <div><label>Estado civil</label><select id="f-edoCivil"><option value="">Seleccionar</option>${ecO}</select></div>
      <div><label>Sexo</label><select id="f-sexo"><option value="">Seleccionar</option><option ${w.sexo==='Masculino'?'selected':''}>Masculino</option><option ${w.sexo==='Femenino'?'selected':''}>Femenino</option></select></div>
      <div><label>Tipo de sangre</label><select id="f-tipoSangre"><option value="">Seleccionar</option>${stO}</select></div>
      <div><label>Estatura (m)</label><input id="f-estatura" type="number" step="0.01" value="${w.estatura||''}" placeholder="1.70"></div>
      <div><label>Peso (kg)</label><input id="f-peso" type="number" step="0.1" value="${w.peso||''}" placeholder="70"></div>
    </div>
    <div style="margin-bottom:14px"><label>Complexión</label><select id="f-complexion" style="max-width:220px"><option value="">Seleccionar</option>${cxO}</select></div>
    <div class="divider"></div>
    <div class="fst">Contacto</div>
    <div class="grid2" style="gap:12px;margin-bottom:12px">
      <div><label>Teléfono</label><input id="f-telefono" value="${w.telefono||''}" placeholder="10 dígitos"></div>
      <div><label>Teléfono 2</label><input id="f-telefono2" value="${w.telefono2||''}" placeholder="Opcional"></div>
    </div>
    <div style="margin-bottom:14px"><label>Dirección</label><input id="f-direccion" value="${w.direccion||''}" placeholder="Calle, número, colonia, ciudad"></div>
    <div class="divider"></div>
    <div class="fst">En caso de accidente</div>
    <div class="grid2" style="gap:12px;margin-bottom:18px">
      <div><label>Nombre del contacto</label><input id="f-emergNombre" value="${w.emergNombre||''}" placeholder="Nombre completo"></div>
      <div><label>Teléfono de emergencia</label><input id="f-emergTel" value="${w.emergTel||''}" placeholder="10 dígitos"></div>
    </div>
    <button class="btn btn-primary" onclick="saveWF('${mode}','${id||''}')">&#128190; ${mode==='edit'?'Guardar cambios':'Registrar trabajador'}</button>
  </div>`;
}

async function saveWF(mode,id){
  const nombre=gv('f-nombre').trim();if(!nombre){alert('El nombre es obligatorio');return}
  const data={nombre,puesto:gv('f-puesto'),curp:gv('f-curp').toUpperCase(),rfc:gv('f-rfc').toUpperCase(),nss:gv('f-nss'),infonavit:gv('f-infonavit'),fechaNac:gv('f-fechaNac'),edoCivil:gv('f-edoCivil'),sexo:gv('f-sexo'),tipoSangre:gv('f-tipoSangre'),estatura:gv('f-estatura'),peso:gv('f-peso'),complexion:gv('f-complexion'),telefono:gv('f-telefono'),telefono2:gv('f-telefono2'),direccion:gv('f-direccion'),emergNombre:gv('f-emergNombre'),emergTel:gv('f-emergTel')};
  ss('loading','Guardando en Google Sheets...');
  if(mode==='edit'){const w=S.workers.find(x=>String(x.id)===String(id));Object.assign(w,data);}
  else{data.id=S.nextWId++;data.activo=true;data.fechaAlta=today();S.workers.push(data);}
  await saveWorkers();ss('ok','Guardado en Google Sheets');backToList();
}

function populateCS(selId){
  const el=document.getElementById(selId);if(!el)return;
  const cur=el.value;
  el.innerHTML='<option value="">Todos los centros</option>'+S.centros.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  el.value=cur;
}

function renderLista(){
  const fecha=gv('lista-fecha')||today();
  const el=document.getElementById('lista-container');
  const ws=S.workers.filter(isAct);
  if(!ws.length){el.innerHTML='<div class="empty">No hay trabajadores activos</div>';return}
  const tipos=['A','F','D','D12','V','I'];
  const labs=['Asistencia','Falta','Doblete','Dobl. 12h','Vacaciones','Incapacidad'];
  el.innerHTML=ws.map(w=>{
    const rec=S.asistencias[w.id]?.[fecha]||{};
    const cO=S.centros.map(ct=>`<option value="${ct.id}" ${String(rec.centro)===String(ct.id)?'selected':''}>${ct.nombre}</option>`).join('');
    return`<div class="card" style="padding:14px 16px">
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        <div class="avatar" style="${avc(Number(w.id)%5)}">${ini(w.nombre)}</div>
        <div style="min-width:140px"><div style="font-size:14px;font-weight:600">${w.nombre}</div><div style="font-size:12px;color:#888">${w.puesto||''}</div></div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;flex:1">
          ${tipos.map((t,i)=>`<button class="asist-btn ${rec.tipo===t?'sel-'+t:''}" onclick="setAsist('${w.id}','${fecha}','${t}',this)">${labs[i]}</button>`).join('')}
        </div>
        <select style="font-size:12px;width:160px" onchange="setCentro('${w.id}','${fecha}',this.value)"><option value="">Sin centro</option>${cO}</select>
      </div>
    </div>`}).join('');
}

async function setAsist(wid,fecha,tipo,btn){
  if(!S.asistencias[wid])S.asistencias[wid]={};
  const cur=S.asistencias[wid][fecha]||{};
  const nt=cur.tipo===tipo?'':tipo;
  S.asistencias[wid][fecha]={...cur,tipo:nt};
  btn.closest('.card').querySelectorAll('.asist-btn').forEach((b,i)=>{
    b.className='asist-btn';
    if(nt===['A','F','D','D12','V','I'][i])b.classList.add('sel-'+nt);
  });
  ss('loading','Guardando...');await saveAsist(wid,fecha,S.asistencias[wid][fecha]);ss('ok','Asistencia guardada en Google Sheets');
}
async function setCentro(wid,fecha,val){
  if(!S.asistencias[wid])S.asistencias[wid]={};
  if(!S.asistencias[wid][fecha])S.asistencias[wid][fecha]={};
  S.asistencias[wid][fecha].centro=val;
  await saveAsist(wid,fecha,S.asistencias[wid][fecha]);
  ss('ok','Centro guardado');
}

function showCentroForm(id){
  const el=document.getElementById('centro-form');el.style.display='block';
  const c=id?S.centros.find(x=>String(x.id)===String(id)):{};
  el.innerHTML=`<div class="card">
    <div class="card-title">${id?'Editar centro':'Nuevo centro de trabajo'}</div>
    <div class="grid2" style="gap:12px;margin-bottom:12px">
      <div><label>Nombre *</label><input id="cf-nombre" value="${c.nombre||''}" placeholder="Ej: Sucursal Norte"></div>
      <div><label>Responsable</label><input id="cf-resp" value="${c.responsable||''}" placeholder="Nombre del responsable"></div>
      <div><label>Dirección</label><input id="cf-dir" value="${c.direccion||''}" placeholder="Dirección del centro"></div>
      <div><label>Teléfono</label><input id="cf-tel" value="${c.telefono||''}" placeholder="Teléfono de contacto"></div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn btn-primary btn-sm" onclick="saveCF('${id||''}')">&#128190; Guardar</button>
      <button class="btn btn-sm" onclick="document.getElementById('centro-form').style.display='none'">Cancelar</button>
    </div>
  </div>`;
}

async function saveCF(id){
  const nombre=gv('cf-nombre').trim();if(!nombre){alert('El nombre es obligatorio');return}
  const data={nombre,responsable:gv('cf-resp'),direccion:gv('cf-dir'),telefono:gv('cf-tel')};
  ss('loading','Guardando...');
  if(id){const c=S.centros.find(x=>String(x.id)===String(id));Object.assign(c,data);}
  else{data.id=S.nextCId++;S.centros.push(data);}
  await saveCentros();ss('ok','Guardado en Google Sheets');
  document.getElementById('centro-form').style.display='none';
  populateCS('lista-centro');renderCentros();
}

function renderCentros(){
  const el=document.getElementById('centros-list');
  if(!S.centros.length){el.innerHTML='<div class="empty"><div style="font-size:3rem">&#127970;</div>No hay centros registrados</div>';return}
  el.innerHTML=S.centros.map(c=>`<div class="card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:${c.responsable||c.telefono||c.direccion?'10':'0'}px">
      <span style="font-size:20px">&#127970;</span>
      <span style="font-size:15px;font-weight:700;flex:1">${c.nombre}</span>
      <button class="btn btn-sm" onclick="showCentroForm('${c.id}')">&#9998; Editar</button>
      <button class="btn btn-danger btn-sm" onclick="delCentro('${c.id}')">&#128465;</button>
    </div>
    <div class="grid2" style="font-size:13px">
      ${c.responsable?`<div><span style="color:#888">Responsable:</span> <strong>${c.responsable}</strong></div>`:''}
      ${c.telefono?`<div><span style="color:#888">Tel:</span> <strong>${c.telefono}</strong></div>`:''}
      ${c.direccion?`<div style="grid-column:1/-1"><span style="color:#888">Dirección:</span> ${c.direccion}</div>`:''}
    </div>
  </div>`).join('');
}

async function delCentro(id){
  const c=S.centros.find(x=>String(x.id)===String(id));
  if(c&&confirm('¿Eliminar "'+c.nombre+'"?')){
    S.centros=S.centros.filter(x=>String(x.id)!==String(id));
    ss('loading','Eliminando...');await saveCentros();ss('ok','Eliminado');renderCentros();
  }
}

function initRep(){
  document.getElementById('rep-worker').innerHTML='<option value="">Todos</option>'+S.workers.map(w=>`<option value="${w.id}">${w.nombre}</option>`).join('');
  document.getElementById('rep-centro').innerHTML='<option value="">Todos</option>'+S.centros.map(c=>`<option value="${c.id}">${c.nombre}</option>`).join('');
  const fin=document.getElementById('rep-fin');if(!fin.value)fin.value=today();
  const ini2=document.getElementById('rep-inicio');if(!ini2.value){const d=new Date();d.setDate(d.getDate()-30);ini2.value=d.toISOString().slice(0,10);}
}

function generarReporte(){
  const wf=gv('rep-worker'),cf=gv('rep-centro'),tf=gv('rep-tipo'),fi=gv('rep-inicio'),ff=gv('rep-fin');
  let rows=[];
  S.workers.forEach(w=>{
    if(wf&&String(w.id)!==wf)return;
    Object.entries(S.asistencias[w.id]||{}).forEach(([fecha,rec])=>{
      if(fi&&fecha<fi)return;if(ff&&fecha>ff)return;
      if(tf&&rec.tipo!==tf)return;if(cf&&String(rec.centro)!==cf)return;
      rows.push({nombre:w.nombre,puesto:w.puesto||'',fecha,tipo:rec.tipo||'—',centro:cn(rec.centro)});
    });
  });
  rows.sort((a,b)=>b.fecha.localeCompare(a.fecha));
  const tot={A:0,F:0,D:0,D12:0,V:0,I:0};
  rows.forEach(r=>{if(tot[r.tipo]!==undefined)tot[r.tipo]++;});
  document.getElementById('reporte-result').innerHTML=`
    <div class="grid4" style="margin-bottom:14px">
      ${['A','F','D','V'].map(t=>`<div class="stat-card"><div class="stat-num" style="font-size:22px">${tot[t]}</div><div class="stat-label">${AL[t]}</div></div>`).join('')}
    </div>
    <div class="card">${!rows.length?'<div class="empty">No hay registros para los filtros seleccionados</div>':`
      <div style="font-size:12px;color:#888;margin-bottom:10px">${rows.length} registros encontrados</div>
      <div style="overflow-x:auto"><table>
        <thead><tr><th>Trabajador</th><th>Puesto</th><th>Fecha</th><th>Tipo</th><th>Centro</th></tr></thead>
        <tbody>${rows.map(r=>`<tr><td style="font-weight:600">${r.nombre}</td><td style="color:#888">${r.puesto}</td><td>${fmt(r.fecha)}</td><td><span class="badge badge-${AC[r.tipo]||'gray'}">${AL[r.tipo]||r.tipo}</span></td><td>${r.centro}</td></tr>`).join('')}</tbody>
      </table></div>`}
    </div>`;
}

initF();
loadAll();
</script>
</body>
</html>
